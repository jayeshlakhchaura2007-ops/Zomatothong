# LightGBM ranking model configuration

model:
  type: lightgbm
  objective: binary  # added vs not added
  metric: auc
  num_leaves: 31
  max_depth: 8
  learning_rate: 0.05
  n_estimators: 500
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
  verbose: -1

# Training
training:
  temporal_split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
  early_stopping_rounds: 50

# Inference
inference:
  top_k: 10
  score_threshold: null  # optional min score
